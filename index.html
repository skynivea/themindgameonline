<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- ⚠️ 모바일에서 화면이 마음대로 확대/축소되지 않게 꽉 잡아주는 핵심 메타 태그 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Mind - 모바일 최적화</title>
    <style>
        /* 🎨 기본 다크모드 테마 및 모바일 터치 방지 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* 모바일에서 꾹 눌렀을 때 텍스트 선택 방지 */
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; /* 터치 시 파란 박스 제거 */
        }

        body {
            background-color: #121214;
            color: #e1e1e6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 📦 전체 메인 컨테이너 (모바일 가로폭 100% 대응) */
        .container {
            width: 100%;
            max-width: 500px; /* PC로 볼 때도 너무 퍼지지 않게 폰 사이즈로 고정 */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 🏠 1. 로그인 / 방 생성 대기 화면 */
        .screen {
            background: #1e1e22;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input, button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: bold;
        }

        input {
            background: #2a2a30;
            color: #fff;
        }

        button {
            background: #6200ee;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:active {
            background: #3700b3; /* 모바일 터치 피드백 */
        }

        /* 📊 2. 상단 게임 정보 대시보드 (목숨, 수리검, 레벨) */
        .status-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }

        .status-card {
            background: #1e1e22;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            border: 1px solid #2a2a30;
        }

        .status-card span {
            display: block;
            font-size: 18px;
            margin-top: 4px;
        }

        /* 🃏 3. 바닥에 깔린 카드 현황판 (Grid 정렬로 모바일에서도 이쁘게 정렬) */
        .table-area {
            background: #1a1a1e;
            border: 2px dashed #333;
            border-radius: 16px;
            min-height: 160px;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            gap: 8px;
            padding: 15px;
        }

        /* 🖐️ 4. 내 손패 (모바일 가로 스크롤 또는 유연한 배치) */
        .my-hand {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap; /* 카드가 많아지면 모바일 화면 아래로 이쁘게 줄바꿈 */
            margin-top: 10px;
        }

        /* 🎴 스마트폰 최적화 카드 디자인 */
        .card {
            width: 65px;
            height: 95px;
            background: linear-gradient(135deg, #3a3d40, #181719);
            border: 2px solid #a8a8b2;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transform: translateY(0);
            transition: transform 0.1s;
        }

        .card:active {
            transform: scale(0.95) translateY(-5px); /* 모바일에서 낼 때 쫀득한 손맛 효과 */
        }

        /* 🖐️ 5. 정신집중 패널 (꽉 찬 화면 대응) */
        .focus-panel {
            background: radial-gradient(circle, #2c1b4d 0%, #121214 100%);
            border: 2px solid #6200ee;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
        }

        .focus-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #6200ee;
            box-shadow: 0 0 20px rgba(98, 0, 238, 0.6);
            margin: 20px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 예시 화면용 아이디 배치 (기존 자바스크립트 ID에 맞춰 연결하세요) -->
        <div id="lobby-screen" class="screen">
            <h2 style="text-align: center; color: #6200ee;">THE MIND</h2>
            <input type="text" id="nickname-input" placeholder="닉네임 입력 (최대 5자)" maxlength="5">
            <button id="create-btn">방 만들기</button>
            <input type="text" id="code-input" placeholder="방 코드 4자리 입력">
            <button id="join-btn" style="background:#03dac6; color:#000;">방 입장하기</button>
        </div>

        <!-- 실제 인게임 레이아웃 화면 예시 -->
        <div id="game-screen" style="display: none; flex-direction: column; gap: 15px;">
            <!-- 상단 바 -->
            <div class="status-bar">
                <div class="status-card">LEVEL<span id="txt-level">1</span></div>
                <div class="status-card">LIVES<span id="txt-lives">❤️ ❤️</span></div>
                <div class="status-card">SHURIKEN<span id="txt-shurikens">🌟</span></div>
            </div>

            <!-- 카드 놓는 테이블 -->
            <div class="table-area" id="table-cards">
                <!-- 여기에 낸 카드들이 추가됨 -->
            </div>

            <!-- 내 카드 리스트 -->
            <div class="my-hand" id="my-cards">
                <!-- 여기에 .card가 스크립트로 꽂힘 -->
            </div>
        </div>
    </div>

    <!-- 🌐 여기에 기존 소켓 연결(io) 및 자바스크립트 코드를 그대로 붙여넣으시면 됩니다! -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        // ... (형님이 짜두신 기존 프론트엔드 자바스크립트 소스코드 여기에 입력)
    </script>
</body>
</html>
